; ============================================================================
;  Gateway Meteo LoRa - LILYGO T5 4.7" ESP32-S3 E-Paper
; ============================================================================

[platformio]
default_envs = t5-epaper-s3

[env:t5-epaper-s3]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino

; --- Hardware: 16MB flash (QIO) + 8MB PSRAM (OPI) ---
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    ; Debug: inietta pacchetti finti di due stazioni meteo simulate al posto
    ; della ricezione LoRa (per collaudare MQTT e display senza radio).
    ; Commentare la riga seguente per la modalità normale.
    -DDEBUG_FAKE_STATIONS
    -Wall
    -Wextra
    -Wno-unused-parameter

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git
    jgromes/RadioLib@^7.1.2
    bblanchon/ArduinoJson@^7.2.1
    knolleary/PubSubClient@^2.8

monitor_speed = 115200
upload_speed = 921600
